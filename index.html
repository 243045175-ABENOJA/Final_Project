<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Portfolio</title>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="script.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="frames">
        <div class="profile">
          <img src="images/Me_in_Suit.jpg" alt="Profile" />
        </div>

        <div class="information">
          <div class="card" data-key="aboutme">About Me</div>
          <div class="card" data-key="education">Education</div>
          <div class="card" data-key="experience">Experience</div>
          <div class="card" data-key="skills">Skills</div>
          <div class="card" data-key="contacts">Contacts</div>
        </div>
      </div>
    </div>

    <div id="modal">
      <div class="modal-content">
        <span id="close">&times;</span>
        <div id="modal-text"></div>
      </div>
    </div>
  </body>
</html>
